name: Jules automation

on:
  workflow_call:
    inputs:
      event:
        description: Event name from the caller workflow.
        required: true
        type: string
    secrets:
      jules_pat:
        description: Personal access token used to apply the jules label.
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  mark-stuck-linked-issue:
    if: ${{ inputs.event == 'issue_comment' }}
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issue to jules-is-stuck when PR is marked stuck
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.jules_pat }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!--jules-is-stuck-->';
            const callerEvent = '${{ inputs.event }}';

            if (callerEvent !== 'issue_comment') {
              core.info(`Skipping stuck handling: caller event is ${callerEvent}.`);
              return;
            }

            const action = context.payload.action;
            if (action !== 'created') {
              core.info(`Skipping stuck handling: issue_comment action is ${action}.`);
              return;
            }

            const issue = context.payload.issue;
            if (!issue?.pull_request) {
              core.info('Skipping stuck handling: comment is not on a pull request.');
              return;
            }

            const pullNumber = issue.number;
            const pullResponse = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });
            const pullRequest = pullResponse.data;

            if (!pullRequest.body?.includes(marker)) {
              core.info(`Skipping PR #${pullNumber}: marker ${marker} is not present in PR body.`);
              return;
            }

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
              }
            };

            await ensureLabel('jules-is-stuck', 'd93f0b', 'Issues blocked because Jules got stuck while implementing.');

            const closingIssuesResponse = await github.graphql(
              `query ClosingIssues($owner: String!, $repo: String!, $pullNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pullNumber) {
                    closingIssuesReferences(first: 100) {
                      nodes { number }
                    }
                  }
                }
              }`,
              { owner, repo, pullNumber },
            );
            const linkedIssues = closingIssuesResponse.repository.pullRequest.closingIssuesReferences.nodes;

            if (linkedIssues.length === 0) {
              core.info(`No linked issues found for PR #${pullNumber}.`);
              return;
            }

            for (const linkedIssue of linkedIssues) {
              const issueNumber = linkedIssue.number;
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issueNumber,
                name: 'jules',
              }).catch((error) => {
                if (error.status !== 404) {
                  throw error;
                }
                core.info(`Linked issue #${issueNumber} does not have the jules label.`);
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['jules-is-stuck'],
              });
              core.info(`Marked linked issue #${issueNumber} as jules-is-stuck.`);
            }

  assign-next-jules-issue:
    needs: [auto-merge-pr]
    if: ${{ inputs.event == 'issues' || (inputs.event == 'workflow_run' && needs.auto-merge-pr.result == 'success') }}
    runs-on: ubuntu-latest
    concurrency:
      group: jules-automation-issues
      cancel-in-progress: false
    steps:
      - name: Label the oldest open issue for Jules
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.jules_pat }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const julesLabel = 'jules';
            const callerEvent = '${{ inputs.event }}';

            if (callerEvent === 'workflow_run') {
              const workflowRun = context.payload.workflow_run;
              if (!workflowRun || workflowRun.event !== 'pull_request' || workflowRun.conclusion !== 'success') {
                core.info('Skipping label assignment: workflow_run is not a successful pull_request run.');
                return;
              }
            }

            const ensureLabel = async (name, color, description) => {
              try {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
              } catch (error) {
                if (error.status !== 422) {
                  throw error;
                }
              }
            };

            await ensureLabel(julesLabel, '0e8a16', 'Issues intended for Jules automation.');

            const julesIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: julesLabel,
              per_page: 100,
            });
            const openJulesIssues = julesIssues.filter((issue) => !issue.pull_request);

            if (openJulesIssues.length > 0) {
              const issueNumbers = openJulesIssues.map((issue) => `#${issue.number}`).join(', ');
              core.info(`At least one open issue already has the ${julesLabel} label: ${issueNumbers}.`);
              return;
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              sort: 'created',
              direction: 'asc',
              per_page: 100,
            });

            const oldestOpenIssue = openIssues.find((issue) => !issue.pull_request);

            if (!oldestOpenIssue) {
              core.info('No open issues are available for Jules assignment.');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: oldestOpenIssue.number,
              labels: [julesLabel],
            });
            core.info(`Added the ${julesLabel} label to oldest open issue #${oldestOpenIssue.number}.`);

  auto-merge-pr:
    runs-on: ubuntu-latest
    concurrency:
      group: jules-automation-workflow-run
      cancel-in-progress: false
    steps:
      - name: Merge PR and close linked issue on CI success
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const callerEvent = '${{ inputs.event }}';

            if (callerEvent !== 'workflow_run') {
              core.info(`Skipping auto-merge: caller event is ${callerEvent}.`);
              return;
            }

            const workflowRun = context.payload.workflow_run;
            if (workflowRun.event !== 'pull_request' || workflowRun.conclusion !== 'success') {
              core.info(`Skipping: event=${workflowRun.event} conclusion=${workflowRun.conclusion}.`);
              return;
            }

            const headSha = workflowRun.head_sha;

            let pullRequests;
            if (workflowRun.pull_requests?.length > 0) {
              pullRequests = workflowRun.pull_requests;
            } else {
              const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: headSha,
              });
              pullRequests = response.data;
            }

            if (pullRequests.length === 0) {
              core.info(`No pull requests are associated with ${headSha}.`);
              return;
            }

            const repoResponse = await github.rest.repos.get({ owner, repo });
            const repository = repoResponse.data;
            let mergeMethod;
            if (repository.allow_squash_merge) {
              mergeMethod = 'squash';
            } else if (repository.allow_merge_commit) {
              mergeMethod = 'merge';
            } else if (repository.allow_rebase_merge) {
              mergeMethod = 'rebase';
            } else {
              throw new Error('No pull request merge method is enabled for this repository.');
            }

            for (const pr of pullRequests) {
              const pullNumber = pr.number;
              const pullResponse = await github.rest.pulls.get({ owner, repo, pull_number: pullNumber });
              const pullRequest = pullResponse.data;

              if (pullRequest.state !== 'open') {
                core.info(`Skipping PR #${pullNumber}: it is ${pullRequest.state}.`);
                continue;
              }
              if (pullRequest.draft) {
                core.info(`Skipping PR #${pullNumber}: it is a draft.`);
                continue;
              }
              if (pullRequest.head.sha !== headSha) {
                core.info(`Skipping PR #${pullNumber}: head SHA changed.`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  merge_method: mergeMethod,
                });
                core.info(`Merged PR #${pullNumber} with the ${mergeMethod} method.`);
              } catch (error) {
                core.info(`Could not merge PR #${pullNumber}: ${error.message}`);
                continue;
              }

              const closingIssuesResponse = await github.graphql(
                `query ClosingIssues($owner: String!, $repo: String!, $pullNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $pullNumber) {
                      closingIssuesReferences(first: 100) {
                        nodes { id number state }
                      }
                    }
                  }
                }`,
                { owner, repo, pullNumber },
              );
              const closingIssues = closingIssuesResponse.repository.pullRequest.closingIssuesReferences.nodes;
              core.info(`Found ${closingIssues.length} linked closing issue(s) for PR #${pullNumber}.`);

              for (const issue of closingIssues) {
                if (issue.state === 'CLOSED') {
                  core.info(`Linked issue #${issue.number} is already closed.`);
                  continue;
                }
                await github.graphql(
                  `mutation CloseLinkedIssue($issueId: ID!) {
                    closeIssue(input: { issueId: $issueId, stateReason: COMPLETED }) {
                      issue { number state }
                    }
                  }`,
                  { issueId: issue.id },
                );
                core.info(`Closed linked issue #${issue.number}.`);
              }
            }
